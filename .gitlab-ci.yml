image: node:22.17.0

stages:
  - build
  - deploy

variables:
  FRONTEND_DEPLOY_PATH: "/var/www/ship-hub/frontend"
  VITE_API_BASE_URL: "/v1"
  DEPLOY_PORT: "22"

build_frontend:
  stage: build
  rules:
    - if: '$CI_COMMIT_BRANCH'
  script:
    - node --version
    - npm --version
    - npm ci
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 hour

deploy_frontend:
  stage: deploy
  needs:
    - build_frontend
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  before_script:
    - apt-get update -y
    - apt-get install -y openssh-client
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - test -n "$DEPLOY_HOST"
    - test -n "$DEPLOY_USER"
    - test -n "$SSH_PRIVATE_KEY_B64"
    - eval $(ssh-agent -s)
    - printf '%s' "$SSH_PRIVATE_KEY_B64" | base64 -d > ~/.ssh/id_ed25519
    - chmod 400 ~/.ssh/id_ed25519
    - ssh-add ~/.ssh/id_ed25519
    - ssh-keyscan -H "$DEPLOY_HOST" > ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
    - export SSH_PORT="${DEPLOY_PORT:-22}"
    - export SSH_TARGET="$DEPLOY_USER@$DEPLOY_HOST"
    - export SSH_CMD="ssh -p $SSH_PORT -o ServerAliveInterval=15 -o ServerAliveCountMax=8 -o ConnectTimeout=30"
  script:
    - test -n "$FRONTEND_DEPLOY_PATH"
    - $SSH_CMD "$SSH_TARGET" "mkdir -p '$FRONTEND_DEPLOY_PATH' && find '$FRONTEND_DEPLOY_PATH' -mindepth 1 -maxdepth 1 -exec rm -rf {} +"
    - tar -czf - -C dist . | $SSH_CMD "$SSH_TARGET" "tar -xzf - -C '$FRONTEND_DEPLOY_PATH'"
    - $SSH_CMD "$SSH_TARGET" "find '$FRONTEND_DEPLOY_PATH' -type d -exec chmod 755 {} + && find '$FRONTEND_DEPLOY_PATH' -type f -exec chmod 644 {} +"
    - $SSH_CMD "$SSH_TARGET" "systemctl reload nginx || true"
  environment:
    name: production
